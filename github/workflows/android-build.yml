name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # This repo has no committed Gradle wrapper (gradlew / gradle-wrapper.jar),
      # so we let setup-gradle provision Gradle directly instead of relying on ./gradlew.
      # If you later add a wrapper via `gradle wrapper`, switch the run steps below to `./gradlew ...`
      # and this action will auto-detect and use it.
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Lint
        run: gradle lint --stacktrace

      - name: Run unit tests
        run: gradle testDebugUnitTest --stacktrace

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: farmmanager-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html
